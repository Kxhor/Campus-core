services:
  - type: web
    name: campus-core
    env: python
    buildCommand: pip install -r requirements.txt && flask db upgrade
    startCommand: gunicorn -k eventlet -w 1 app_legacy:app
    envVars:
      - key: FLASK_APP
        value: app_legacy.py
      - key: DATABASE_URL
        fromDatabase:
          name: campus-core-db
          property: connectionString
      - key: FLASK_DEBUG
        value: "False"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: campus-core-db
    plan: free
